listening-port=3478
tls-listening-port=5349
fingerprint
use-auth-secret
static-auth-secret=${TURN_SHARED_SECRET}
realm=${TURN_REALM}
cert=/etc/letsencrypt/live/${TURN_REALM}/fullchain.pem
pkey=/etc/letsencrypt/live/${TURN_REALM}/privkey.pem
log-file=stdout
simple-log
no-cli
no-multicast-peers
no-loopback-peers
